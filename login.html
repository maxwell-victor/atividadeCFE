<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LH Games - login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html"><img src="img/logo.png" alt="Logo LH Games"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Promoções</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Console</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Jogos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="login.html">Login</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="O que deseja buscar?" aria-label="Search">
                        <button class="btn btn-outline-success" type="submit">Buscar</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>
    

    <main>
        <section id="section-login" class="container py-5">
            <h1 class="text-center mb-4">Login</h1>
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <form method="post" action="" id="login" class="card p-4 shadow">
                        <div class="mb-3">
                            <label for="usuario" class="form-label">Nome:</label>
                            <input id="usuario" name="usuario" required="required" type="text"
                                placeholder="Insira o seu usuário" class="form-control" />
                        </div>
                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha:</label>
                            <input id="senha" name="senha" required="required" type="password"
                                placeholder="Insira a sua senha" class="form-control" />
                        </div>
                        <div class="d-grid">
                            <input type="button" value="Entrar" class="btn btn-primary" id="bt-login" onclick="login()" />
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <section id="section-cadastro" class="container py-4">
            <div class="text-center mb-4">
                <button type="button" class="btn btn-info" data-bs-toggle="collapse" data-bs-target="#form-cadastrar">
                    Não é cadastrado ainda? Cadastre-se
                </button>
            </div>
            <div id="form-cadastrar" class="collapse">
                <div class="row justify-content-center">
                    <div class="col-md-6 col-lg-4">
                        <div class="card p-4 shadow">
                            <h2 class="text-center mb-3">Criar minha conta</h2>
                            <p class="text-muted text-center">Informe os seus dados abaixo para criar sua conta.</p>
                            <form method="post" action="" id="cadastro">
                                <div class="mb-3">
                                    <label for="usuario2" class="form-label">Usuário:</label>
                                    <input id="usuario2" name="usuario2" required="required" type="text"
                                        placeholder="ex. nome de usuário" class="form-control" />
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">E-mail:</label>
                                    <input id="email" name="email" required="required" type="email"
                                        placeholder="seu@email.com.br" class="form-control" />
                                </div>
                                <div class="mb-3">
                                    <label for="senha2" class="form-label">Senha:</label>
                                    <input id="senha2" name="senha2" required="required" type="password"
                                        placeholder="mínimo de 6 caracteres" class="form-control" />
                                </div>
                                <div class="d-grid">
                                    <input type="button" value="Cadastrar" class="btn btn-primary" id="bt-cadastrar"
                                        onclick="cadastro()" />
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>



    <footer class="text-center py-3">
        <p class="mb-0">desenvolvido por LH games</p>
    </footer>

    <button id="voltar-topo" type="button" class="btn btn-outline-primary position-fixed bottom-0 end-0 m-3" onclick="topo()" aria-label="Voltar ao topo">&uarr; Voltar ao topo</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
        crossorigin="anonymous"></script>
    <script src="js/script.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.1.js"
        integrity="sha256-3zlB5s2uwoUzrXK3BT7AX3FyvojsraNFxCc2vC/7pNI=" crossorigin="anonymous"></script>
    <script type="text/javascript" src="js/jquery-script.js"></script>

</body>

</html>
